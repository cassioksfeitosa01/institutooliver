<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esteira Infinita Profissional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/skeleton/2.0.4/skeleton.min.css">

    <style>
        body { background-color: #000; color: white; overflow-x: hidden; }

        /* 1. CONTAINER QUE SEGURA TUDO */
        .esteira-wrapper {
            width: 100vw;
            overflow: hidden;
            padding: 50px 0;
            position: relative;
            background: #000;
        }

        /* 2. O TRILHO (TRACK) - O SEGREDO ESTÁ AQUI */
        .esteira-track {
            display: flex;
            width: max-content; /* Faz o trilho ter o tamanho exato da soma dos vídeos */
            flex-wrap: nowrap;
            animation: rolar-infinito 30s linear infinite; /* Movimento contínuo */
        }

        /* Classe que o JS usa para travar tudo no PLAY */
        .travado-total {
            animation-play-state: paused !important;
        }

        /* Pausa ao passar o mouse no PC */
        .esteira-track:hover {
            animation-play-state: paused;
        }

        /* 3. CARD DO VÍDEO (Estilo Shorts) */
        .short-card {
            width: 250px;
            height: 440px;
            margin-right: 20px; /* Espaço entre um vídeo e outro */
            flex-shrink: 0; /* Impede o vídeo de "espremer" em telas grandes */
            background: #111;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }

        .short-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 4. A MÁGICA DO LOOP INFINITO */
        @keyframes rolar-infinito {
            0% {
                transform: translateX(0);
            }
            100% {
                /* Ele move exatamente METADE do trilho. 
                   Como a segunda metade é igual à primeira, o olho não vê o reset. */
                transform: translateX(-50%);
            }
        }

        h2 { text-align: center; color: #fff; margin-bottom: 40px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Depoimentos Clientes</h2>
    </div>

    <div class="esteira-wrapper">
        <div class="esteira-track" id="esteira">

        </div>
    </div>

    <script>
        const esteira = document.getElementById('esteira');
        const vids = document.querySelectorAll('video');

        vids.forEach(v => {
            // Travamento total ao dar play
            v.addEventListener('play', () => {
                esteira.classList.add('travado-total');
                // Pausa os outros para não virar bagunça sonora
                vids.forEach(outro => { if (outro !== v) outro.pause(); });
            });

            // Retoma a esteira ao pausar ou terminar
            v.addEventListener('pause', () => {
                esteira.classList.remove('travado-total');
            });
            v.addEventListener('ended', () => {
                esteira.classList.remove('travado-total');
            });
        });
    </script>

</body>
